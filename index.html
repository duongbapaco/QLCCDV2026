<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quan Ly Nghi Phep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #f8fafc; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; }
        .zebra tr:nth-child(even) { background-color: #f1f5f9; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="bg-white p-5 rounded border shadow-sm">
            <h2 class="font-bold mb-2">📋 Danh sách nhân sự (Dán dữ liệu từ Excel)</h2>
            <div id="pasteArea" contenteditable="true" class="w-full p-4 border-2 border-dashed rounded text-center text-gray-400">Nhấn Ctrl+V tại đây</div>
            <table id="staffTable" class="zebra mt-4 text-sm hidden"><thead><tr id="staffHead"></tr></thead><tbody id="staffBody"></tbody></table>
        </div>

        <div class="bg-white p-5 rounded border shadow-sm">
            <h2 class="font-bold mb-4">📝 Đăng ký nghỉ phép</h2>
            <div class="grid grid-cols-2 gap-4">
                <select id="staffSelect" class="p-2 border rounded"></select>
                <input type="date" id="d1" class="p-2 border rounded">
                <button onclick="saveData()" class="bg-blue-800 text-white p-2 rounded">Gửi Đơn</button>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình Supabase - Đảm bảo thay URL/KEY của bạn
        const sb = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');

        // Xử lý dán dữ liệu
        document.getElementById('pasteArea').addEventListener('paste', (e) => {
            const data = e.clipboardData.getData('text/html') || e.clipboardData.getData('text/plain');
            const div = document.createElement('div'); div.innerHTML = data;
            const table = div.querySelector('table');
            if (table) {
                document.getElementById('staffTable').classList.remove('hidden');
                document.getElementById('pasteArea').classList.add('hidden');
                // Code xử lý đổ dữ liệu vào bảng...
            }
        });

        async function saveData() {
            try {
                const { data, error } = await sb.from('lich_nghi').insert([{ ho_ten: 'Test' }]);
                alert("Đã gửi thành công!");
            } catch (err) { alert("Lỗi kết nối database"); }
        }
    </script>
</body>
</html>
