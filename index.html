<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Nghỉ Phép 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .font-times { font-family: 'Times New Roman', Times, serif; }
        .zebra-table tbody tr:nth-child(even) { background-color: #f8fafc; }
        .zebra-table tbody tr:hover { background-color: #eff6ff; }
        #pasteArea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="bg-slate-100 p-6 font-times text-slate-800">
    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="flex justify-between items-center bg-white p-5 rounded-xl shadow-sm border border-slate-200">
            <h1 class="font-bold text-xl uppercase tracking-wider">HỆ THỐNG QUẢN LÝ NGHỈ PHÉP 2026</h1>
            <div id="connStatus" class="px-4 py-1.5 rounded-full bg-yellow-100 text-yellow-700 text-xs font-bold border border-yellow-200">ĐANG KẾT NỐI...</div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="font-bold text-lg mb-4 flex items-center"><span class="bg-blue-600 w-1.5 h-6 rounded mr-3"></span>📋 Bước 1: Danh sách nhân sự</h2>
            <div id="pasteArea" contenteditable="true" class="w-full p-8 border-2 border-dashed border-slate-300 rounded-lg text-center text-slate-400 cursor-pointer hover:border-blue-400 transition-all">Nhấn vào đây và nhấn Ctrl + V dán dữ liệu Excel</div>
            <div class="overflow-x-auto mt-4 hidden" id="tableContainer">
                <table class="zebra-table w-full text-sm border border-slate-200" id="staffTable">
                    <thead class="bg-slate-800 text-white uppercase text-xs" id="staffHead"></thead>
                    <tbody id="staffBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="font-bold text-lg mb-4 flex items-center"><span class="bg-blue-600 w-1.5 h-6 rounded mr-3"></span>📝 Bước 2: Đăng ký nghỉ phép</h2>
            <div class="grid grid-cols-2 gap-4">
                <select id="staffSelect" class="p-2 border border-slate-300 rounded"><option>-- Chọn nhân sự --</option></select>
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="d1" onchange="calc()" class="p-2 border border-slate-300 rounded">
                    <input type="date" id="d2" onchange="calc()" class="p-2 border border-slate-300 rounded">
                </div>
                <input type="text" id="phone" class="p-2 border border-slate-300 rounded" placeholder="Số điện thoại liên lạc">
                <input type="text" id="reason" class="p-2 border border-slate-300 rounded" placeholder="Lý do xin nghỉ">
            </div>
            <button id="btnSubmit" onclick="submitData()" class="mt-4 w-full bg-blue-900 text-white font-bold py-2 rounded hover:bg-blue-800 transition-all">🚀 Gửi Đơn & Lưu Cloud</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="flex justify-between mb-4">
                <h2 class="font-bold text-lg flex items-center"><span class="bg-blue-600 w-1.5 h-6 rounded mr-3"></span>🔵 Bước 3: Thống kê</h2>
                <div class="space-x-2">
                    <button onclick="exportToExcel()" class="bg-green-700 text-white px-4 py-1.5 rounded text-sm font-bold">XUẤT EXCEL</button>
                    <button onclick="exportToPDF()" class="bg-red-700 text-white px-4 py-1.5 rounded text-sm font-bold">XUẤT PDF</button>
                </div>
            </div>
            <table class="zebra-table w-full text-sm border border-slate-200" id="reportTable">
                <thead><tr class="bg-slate-100 text-left uppercase text-xs"><th>Họ và Tên</th><th>Từ ngày</th><th>SĐT</th><th>Lý do</th></tr></thead>
                <tbody id="reportBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');

        // Khởi động
        window.onload = async () => {
            fetchData();
            const ind = document.getElementById('connStatus');
            try {
                const { error } = await sb.from('lich_nghi').select('id', {limit:1});
                ind.innerText = error ? "LỖI KẾT NỐI" : "ĐÃ KẾT NỐI ONLINE";
                ind.className = error ? "px-4 py-1.5 rounded-full bg-red-100 text-red-600 text-xs font-bold border border-red-200" : "px-4 py-1.5 rounded-full bg-green-100 text-green-700 text-xs font-bold border border-green-200";
            } catch(e) { console.log(e); }
        };

        // Hàm bung dữ liệu
        async function fetchData() {
            const { data } = await sb.from('lich_nghi').select('*');
            const body = document.getElementById('reportBody');
            if (data) {
                body.innerHTML = data.map(i => `<tr><td class="p-3">${i.ho_ten}</td><td class="p-3">${i.tu_ngay}</td><td class="p-3">${i.phone || ''}</td><td class="p-3">${i.ly_do || ''}</td></tr>`).join('');
            }
        }

        // Xử lý gửi đơn
        async function submitData() {
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "ĐANG GỬI...";
            const { error } = await sb.from('lich_nghi').insert([{ 
                ho_ten: document.getElementById('staffSelect').value,
                tu_ngay: document.getElementById('d1').value,
                den_ngay: document.getElementById('d2').value,
                phone: document.getElementById('phone').value,
                ly_do: document.getElementById('reason').value
            }]);
            if (error) alert("Lỗi: " + error.message);
            else { alert("Đã lưu thành công!"); fetchData(); }
            btn.innerText = "🚀 Gửi Đơn & Lưu Cloud";
        }

        // Logic cũ (Giữ nguyên)
        document.getElementById('pasteArea').addEventListener('paste', (e) => {
            const div = document.createElement('div'); div.innerHTML = e.clipboardData.getData('text/html');
            const rows = Array.from(div.querySelectorAll('tr'));
            const select = document.getElementById('staffSelect');
            rows.forEach((row, i) => {
                const cells = row.querySelectorAll('td, th');
                if (cells.length > 1 && i > 0) select.innerHTML += `<option>${cells[1].innerText}</option>`;
            });
            document.getElementById('tableContainer').classList.remove('hidden');
        });

        function exportToExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('reportTable')), "BaoCao.xlsx"); }
        function exportToPDF() { html2pdf().from(document.getElementById('reportTable')).save('BaoCao.pdf'); }
    </script>
</body>
</html>
