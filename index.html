<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Mini Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="max-w-4xl mx-auto p-4">
        <h1 class="text-xl font-bold mb-4">Lịch sử nghỉ phép</h1>
        
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-sm border-collapse table-fixed">
                <thead class="bg-gray-100 text-left">
                    <tr>
                        <th class="p-3 w-1/3">Nhân viên</th>
                        <th class="p-3 w-1/3">Ngày nghỉ</th>
                        <th class="p-3 w-1/3">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="leaveBody" class="divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');

        async function loadHistory() {
            const { data } = await supabase.from('leave_requests').select('*').order('created_at', {ascending: false});
            const tbody = document.getElementById('leaveBody');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td class="p-3 truncate font-medium">${item.full_name}</td>
                    <td class="p-3 truncate text-gray-500">${item.start_date}</td>
                    <td class="p-3">
                        <button onclick="editLeave('${item.id}')" class="text-blue-600 mr-2">Sửa</button>
                        <button onclick="deleteLeave('${item.id}')" class="text-red-600">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteLeave(id) {
            if(!confirm('Xác nhận xóa?')) return;
            await supabase.from('leave_requests').delete().eq('id', id);
            loadHistory();
        }

        async function editLeave(id) {
            const newDate = prompt("Nhập ngày bắt đầu mới (YYYY-MM-DD):");
            if(!newDate) return;
            await supabase.from('leave_requests').update({start_date: newDate}).eq('id', id);
            loadHistory();
        }

        loadHistory();
    </script>
</body>
</html>
