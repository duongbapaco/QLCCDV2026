<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Leave Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container"><span class="navbar-brand">Hệ thống Quản trị Nghỉ phép Chuyên nghiệp</span></div>
</nav>

<div class="container">
    <div class="card p-4 shadow-sm mb-4">
        <h5 class="text-primary">Quản lý Danh sách Cán bộ</h5>
        <div class="row g-3">
            <div class="col-md-6 border-end">
                <form id="empForm" class="row g-2">
                    <input type="text" id="eName" class="form-control" placeholder="Tên cán bộ" required>
                    <input type="text" id="eDept" class="form-control" placeholder="Đơn vị/Phòng ban" required>
                    <button type="submit" class="btn btn-primary btn-sm">Thêm thủ công</button>
                </form>
            </div>
            <div class="col-md-6">
                <label class="btn btn-outline-success btn-sm">
                    Nhập hàng loạt từ Excel <input type="file" id="excelFile" class="d-none" accept=".xlsx, .xls">
                </label>
                <p class="small text-muted mt-2">File Excel cần cột: Full Name, Department</p>
            </div>
        </div>
    </div>

    <div class="card p-4 shadow-sm mb-4">
        <h5 class="text-primary">Đăng ký Nghỉ phép (Tự động trừ T7 & CN)</h5>
        <form id="leaveForm" class="row g-3">
            <div class="col-md-4"><label>Cán bộ</label><select id="empSelect" class="form-select" required></select></div>
            <div class="col-md-3"><label>Từ ngày</label><input type="date" id="start" class="form-control" required></div>
            <div class="col-md-3"><label>Đến ngày</label><input type="date" id="end" class="form-control" required></div>
            <div class="col-md-2"><label>Số ngày</label><input type="text" id="totalDays" class="form-control" readonly></div>
            <div class="col-md-6"><label>Lý do</label><select id="reason" class="form-select"><option>Nghỉ phép năm</option><option>Nghỉ ốm</option><option>Việc riêng</option></select></div>
            <div class="col-md-6"><label>SĐT liên lạc</label><input type="tel" id="contact" class="form-control" required></div>
            <div class="col-12"><button type="submit" class="btn btn-success w-100">Gửi đơn xin nghỉ</button></div>
        </form>
    </div>

    <table class="table table-hover bg-white shadow-sm">
        <thead class="table-dark">
            <tr><th>Cán bộ</th><th>Từ</th><th>Đến</th><th>Tổng</th><th>Lý do</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="leaveTable"></tbody>
    </table>
</div>

<script>
    const _sb = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');

    // Logic tính ngày làm việc
    const calculateWorkingDays = () => {
        const start = new Date(document.getElementById('start').value);
        const end = new Date(document.getElementById('end').value);
        if (start > end) return;
        let count = 0;
        let cur = new Date(start);
        while (cur <= end) {
            if (cur.getDay() !== 0 && cur.getDay() !== 6) count++;
            cur.setDate(cur.getDate() + 1);
        }
        document.getElementById('totalDays').value = count;
    };
    document.getElementById('start').onchange = calculateWorkingDays;
    document.getElementById('end').onchange = calculateWorkingDays;

    // Load data
    async function init() {
        const { data: emps } = await _sb.from('employees').select('*');
        document.getElementById('empSelect').innerHTML = emps.map(e => `<option value="${e.id}">${e.full_name}</option>`).join('');

        const { data: leaves } = await _sb.from('leave_requests').select('*, employees(full_name)');
        document.getElementById('leaveTable').innerHTML = leaves.map(l => `
            <tr>
                <td>${l.employees.full_name}</td><td>${l.start_date}</td><td>${l.end_date}</td>
                <td>${l.total_days}</td><td>${l.reason}</td>
                <td><button class="btn btn-sm btn-outline-danger" onclick="deleteReq(${l.id})">Xóa</button></td>
            </tr>`).join('');
    }

    // Handlers
    document.getElementById('empForm').onsubmit = async (e) => {
        e.preventDefault();
        await _sb.from('employees').insert([{ full_name: document.getElementById('eName').value, department: document.getElementById('eDept').value }]);
        location.reload();
    };

    document.getElementById('leaveForm').onsubmit = async (e) => {
        e.preventDefault();
        await _sb.from('leave_requests').insert([{
            employee_id: document.getElementById('empSelect').value,
            start_date: document.getElementById('start').value,
            end_date: document.getElementById('end').value,
            total_days: document.getElementById('totalDays').value,
            reason: document.getElementById('reason').value,
            phone_contact: document.getElementById('contact').value
        }]);
        init();
    };

    window.deleteReq = async (id) => {
        if (prompt("Nhập mã quản trị:") === "1234") {
            await _sb.from('leave_requests').delete().eq('id', id);
            init();
        }
    };

    init();
</script>
</body>
</html>
