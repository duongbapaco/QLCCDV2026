<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Leave Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-4xl mx-auto space-y-6">
        <!-- 1. Quản lý cán bộ -->
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-xl font-bold mb-4">Danh sách Cán bộ</h2>
            <textarea id="staffInput" class="w-full p-2 border rounded h-24" placeholder="Dán danh sách (Tên, Ngày vào làm YYYY-MM-DD, Độc hại 1/0)"></textarea>
            <button onclick="importStaff()" class="mt-2 bg-green-600 text-white px-4 py-2 rounded">Cập nhật vào hệ thống</button>
        </div>

        <!-- 2. Đăng ký nghỉ phép -->
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-xl font-bold mb-4">Đăng ký Nghỉ phép</h2>
            <select id="staffSelect" class="w-full p-2 border rounded mb-4"></select>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="date" id="start" class="p-2 border rounded">
                <input type="date" id="end" class="p-2 border rounded">
            </div>
            <input type="text" id="phone" placeholder="Số điện thoại" class="w-full p-2 border rounded mb-4">
            <select id="reason" class="w-full p-2 border rounded mb-4">
                <option>Nghỉ phép năm</option>
                <option>Nghỉ ốm</option>
                <option>Việc riêng</option>
            </select>
            <button onclick="submitLeave()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">Gửi đơn</button>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');

        // Load danh sách cán bộ
        async function fetchStaff() {
            const { data } = await supabase.from('staff_list').select('*');
            const sel = document.getElementById('staffSelect');
            sel.innerHTML = data.map(s => `<option value="${s.id}">${s.full_name}</option>`).join('');
        }

        // Logic tính phép theo Luật
        function getLeaveEntitlement(joinDate, isHazardous) {
            const years = new Date().getFullYear() - new Date(joinDate).getFullYear();
            let days = 12 + Math.floor(years / 5);
            return isHazardous ? days + 2 : days;
        }

        // Đẩy dữ liệu cán bộ từ Textarea
        async function importStaff() {
            const lines = document.getElementById('staffInput').value.split('\n');
            const data = lines.map(line => {
                const [full_name, join_date, is_hazardous] = line.split(',');
                return { full_name, join_date, is_hazardous: is_hazardous == '1' };
            });
            await supabase.from('staff_list').insert(data);
            alert("Đã cập nhật danh sách!");
            fetchStaff();
        }

        // Tính ngày làm việc và gửi đơn
        async function submitLeave() {
            const start = new Date(document.getElementById('start').value);
            const end = new Date(document.getElementById('end').value);
            let count = 0;
            let d = new Date(start);
            while(d <= end) {
                if(d.getDay() !== 0 && d.getDay() !== 6) count++;
                d.setDate(d.getDate() + 1);
            }
            
            const { error } = await supabase.from('leave_requests').insert([{
                staff_id: document.getElementById('staffSelect').value,
                start_date: document.getElementById('start').value,
                end_date: document.getElementById('end').value,
                total_days: count,
                phone_contact: document.getElementById('phone').value,
                reason: document.getElementById('reason').value
            }]);
            
            alert(error ? "Lỗi: " + error.message : "Đã gửi đơn: " + count + " ngày");
        }

        fetchStaff();
    </script>
</body>
</html>
