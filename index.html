<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HR Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-xl shadow grid md:grid-cols-2 gap-6">
            <div>
                <h2 class="font-bold mb-2">1. Import Danh sách (Excel)</h2>
                <input type="file" id="upload" class="text-sm">
                <button onclick="importData()" class="mt-2 bg-blue-600 text-white px-4 py-1 rounded text-sm">XỬ LÝ DỮ LIỆU</button>
            </div>
            <div>
                <h2 class="font-bold mb-2">2. Đăng ký Nghỉ phép</h2>
                <input list="staffList" id="reg_name" placeholder="Tìm tên nhân viên..." class="w-full p-2 border rounded mb-2 text-sm">
                <datalist id="staffList"></datalist>
                <input type="date" id="start_date" class="w-full p-2 border rounded text-sm">
                <button onclick="saveLeave()" class="mt-2 bg-indigo-600 text-white w-full py-2 rounded font-bold">LƯU ĐƠN</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Tìm kiếm nhân viên trong bảng..." class="w-full p-2 border rounded mb-4">
            <div class="overflow-x-auto max-h-[400px] overflow-y-auto">
                <table class="w-full text-sm text-left" id="mainTable">
                    <thead class="bg-gray-100 sticky top-0">
                        <tr><th class="p-2">Họ tên</th><th class="p-2">CCCD</th><th class="p-2">Chức danh</th><th class="p-2">Hành động</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');

        // Import và hiển thị danh sách
        function importData() {
            const file = document.getElementById('upload').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const wb = XLSX.read(e.target.result, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1}).slice(1);
                
                document.getElementById('tableBody').innerHTML = rows.map(r => `
                    <tr><td class="p-2">${r[1]||''}</td><td class="p-2">${r[4]||''}</td><td class="p-2">${r[13]||''}</td>
                        <td class="p-2"><button onclick="this.parentElement.parentElement.remove()" class="text-red-500">Xóa</button></td>
                    </tr>
                `).join('');
                
                document.getElementById('staffList').innerHTML = rows.map(r => `<option value="${r[1]}">`).join('');
            };
            reader.readAsArrayBuffer(file);
        }

        // Tìm kiếm nhanh
        function filterTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
        }

        async function saveLeave() {
            const name = document.getElementById('reg_name').value;
            const date = document.getElementById('start_date').value;
            alert(`Đã lưu đơn nghỉ cho: ${name} vào ngày ${date}`);
        }
    </script>
</body>
</html>
