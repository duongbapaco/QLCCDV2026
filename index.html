<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Nghỉ Phép 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .font-times { font-family: 'Times New Roman', serif; }
        .progress-fill { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 p-6 font-times text-slate-800">
    <div class="max-w-6xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase border-b-2 border-slate-800 pb-2">Hệ thống quản lý nghỉ phép 2026</h1>

        <div class="bg-white p-6 rounded shadow border">
            <h2 class="font-bold mb-4">📋 Bước 1: Danh sách nhân sự (Dán từ Excel)</h2>
            <div id="pasteArea" contenteditable="true" class="w-full p-4 border-2 border-dashed rounded text-slate-400">Dán danh sách tại đây...</div>
        </div>

        <div class="bg-white p-6 rounded shadow border">
            <h2 class="font-bold mb-4">📝 Bước 2: Đăng ký nghỉ</h2>
            <div class="grid grid-cols-3 gap-4">
                <select id="staffSelect" class="p-2 border rounded"></select>
                <div class="flex gap-2">
                    <input type="date" id="d1" class="p-2 border rounded">
                    <input type="date" id="d2" class="p-2 border rounded">
                </div>
                <button onclick="submitData()" class="bg-blue-900 text-white rounded font-bold">Lưu lên Cloud</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded shadow border">
            <h2 class="font-bold mb-4">🔵 Bước 3: Thống kê & Tiến độ</h2>
            <table class="w-full border-collapse border">
                <thead><tr class="bg-slate-100"><th>Họ & Tên</th><th>Quỹ (Luật)</th><th>Đã nghỉ</th><th>Tiến độ</th></tr></thead>
                <tbody id="reportBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');
        let staffList = []; // Lưu danh sách nhân sự

        // Tự động tính toán quỹ phép theo luật (12 ngày/năm)
        const QUY_LUAT = 12;

        async function fetchData() {
            const { data } = await sb.from('lich_nghi').select('*');
            const body = document.getElementById('reportBody');
            body.innerHTML = "";

            staffList.forEach(name => {
                const logs = data.filter(i => i.ho_ten === name);
                const daNghi = logs.reduce((sum, i) => {
                    const d1 = new Date(i.tu_ngay), d2 = new Date(i.den_ngay);
                    return sum + Math.max(0, (d2 - d1) / 86400000 + 1);
                }, 0);

                const conLai = Math.max(0, QUY_LUAT - daNghi);
                const phanTram = (conLai / QUY_LUAT) * 100;

                body.innerHTML += `
                    <tr>
                        <td class="p-2 border">${name}</td>
                        <td class="p-2 border">${QUY_LUAT} ngày</td>
                        <td class="p-2 border text-red-600 font-bold">${daNghi} ngày</td>
                        <td class="p-2 border">
                            <div class="w-full bg-slate-200 h-4 rounded"><div class="progress-fill bg-green-500 h-full rounded" style="width: ${phanTram}%"></div></div>
                            <span class="text-xs">Còn lại: ${conLai} ngày</span>
                        </td>
                    </tr>`;
            });
        }

        // Logic dán danh sách và cập nhật Select box
        document.getElementById('pasteArea').addEventListener('paste', (e) => {
            const text = e.clipboardData.getData('text/plain');
            staffList = text.split('\n').filter(line => line.trim() !== "").map(line => line.split('\t')[1] || line.split('\t')[0]);
            const select = document.getElementById('staffSelect');
            select.innerHTML = staffList.map(name => `<option>${name}</option>`).join('');
            fetchData();
        });

        async function submitData() {
            const ho_ten = document.getElementById('staffSelect').value;
            const tu_ngay = document.getElementById('d1').value;
            const den_ngay = document.getElementById('d2').value;
            await sb.from('lich_nghi').insert([{ ho_ten, tu_ngay, den_ngay }]);
            alert("Đã lưu!"); fetchData();
        }

        window.onload = fetchData;
    </script>
</body>
</html>
