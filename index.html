<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Leave Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Hệ thống Quản lý Phép - Smart Leave</span>
    </div>
</nav>

<div class="container">
    <div class="card p-4 shadow-sm mb-4">
        <h5>Đăng ký Nghỉ phép</h5>
        <form id="leaveForm" class="row g-3">
            <div class="col-md-4">
                <select id="empSelect" class="form-select" required></select>
            </div>
            <div class="col-md-3"><input type="date" id="start" class="form-control" required></div>
            <div class="col-md-3"><input type="date" id="end" class="form-control" required></div>
            <div class="col-md-2"><input type="text" id="totalDays" class="form-control" readonly placeholder="Số ngày"></div>
            <div class="col-md-6">
                <select id="reason" class="form-select">
                    <option>Nghỉ phép năm</option><option>Nghỉ ốm</option><option>Việc riêng</option><option>Nghỉ thai sản</option>
                </select>
            </div>
            <div class="col-md-6"><input type="tel" id="contact" placeholder="SĐT liên lạc" class="form-control" required></div>
            <button type="submit" class="btn btn-primary">Gửi yêu cầu nghỉ phép</button>
        </form>
    </div>

    <table class="table table-hover bg-white shadow-sm">
        <thead class="table-dark">
            <tr><th>Cán bộ</th><th>Từ ngày</th><th>Đến ngày</th><th>Tổng ngày</th><th>Lý do</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="leaveTable"></tbody>
    </table>
</div>

<script>
    const _sb = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');

    // Tự động tính ngày
    const calculateDays = () => {
        const start = new Date(document.getElementById('start').value);
        const end = new Date(document.getElementById('end').value);
        if (start && end && end >= start) {
            const diff = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
            document.getElementById('totalDays').value = diff;
        }
    };
    document.getElementById('start').onchange = calculateDays;
    document.getElementById('end').onchange = calculateDays;

    // Load dữ liệu
    async function init() {
        // Load danh sách nhân viên vào dropdown
        const { data: emps } = await _sb.from('employees').select('*');
        document.getElementById('empSelect').innerHTML = emps.map(e => `<option value="${e.id}">${e.full_name}</option>`).join('');

        // Load bảng nghỉ phép
        const { data: leaves } = await _sb.from('leave_requests').select('*, employees(full_name)');
        document.getElementById('leaveTable').innerHTML = leaves.map(l => `
            <tr>
                <td>${l.employees.full_name}</td>
                <td>${l.start_date}</td>
                <td>${l.end_date}</td>
                <td>${l.total_days}</td>
                <td>${l.reason}</td>
                <td><button class="btn btn-sm btn-danger" onclick="deleteReq(${l.id})">Xóa</button></td>
            </tr>`).join('');
    }

    // Submit form
    document.getElementById('leaveForm').onsubmit = async (e) => {
        e.preventDefault();
        await _sb.from('leave_requests').insert([{
            employee_id: document.getElementById('empSelect').value,
            start_date: document.getElementById('start').value,
            end_date: document.getElementById('end').value,
            total_days: document.getElementById('totalDays').value,
            reason: document.getElementById('reason').value,
            phone_contact: document.getElementById('contact').value
        }]);
        alert("Đã gửi đơn!"); init();
    };

    // Xóa với mã PIN
    window.deleteReq = async (id) => {
        const pin = prompt("Nhập mã quản trị để xóa:");
        if (pin === "1234") {
            await _sb.from('leave_requests').delete().eq('id', id);
            init();
        } else { alert("Mã sai!"); }
    };

    init();
</script>
</body>
</html>
