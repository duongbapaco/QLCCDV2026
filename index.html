<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HR Professional Processor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-7xl mx-auto space-y-4">
        <div class="bg-white p-6 rounded-xl shadow border">
            <h1 class="text-xl font-bold mb-4">Xử lý file dữ liệu nhân sự</h1>
            <input type="file" id="upload" class="mb-4 block">
            <button onclick="processData()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700">HIỂN THỊ DỮ LIỆU</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow overflow-x-auto">
            <table class="w-full text-xs text-left" id="dataTable">
                <thead class="bg-gray-800 text-white uppercase">
                    <tr>
                        <th class="p-3">Stt</th>
                        <th class="p-3">Họ và tên</th>
                        <th class="p-3">Số sổ BHXH</th>
                        <th class="p-3">Số CCCD</th>
                        <th class="p-3">Năm sinh</th>
                        <th class="p-3">Chức danh</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y"></tbody>
            </table>
        </div>
    </div>

    <script>
        function processData() {
            const file = document.getElementById('upload').files[0];
            if (!file) return alert("Vui lòng chọn file!");

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const ws = wb.Sheets[wb.SheetNames[0]];
                
                // Đọc theo mảng thuần để tránh lỗi tiêu đề
                const jsonData = XLSX.utils.sheet_to_json(ws, {header: 1});
                
                // Lấy từ dòng thứ 2 trở đi (bỏ qua dòng tiêu đề)
                const rows = jsonData.slice(1);
                
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = rows.filter(r => r.length > 0).map(row => `
                    <tr>
                        <td class="p-3">${row[0] || ''}</td>
                        <td class="p-3 font-bold">${row[1] || ''}</td>
                        <td class="p-3">${row[3] || ''}</td>
                        <td class="p-3">${row[4] || ''}</td>
                        <td class="p-3">${row[11] || ''}</td>
                        <td class="p-3 text-gray-600">${row[13] || ''}</td>
                    </tr>
                `).join('');
                
                alert("Đã hiển thị " + rows.length + " bản ghi thành công!");
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
