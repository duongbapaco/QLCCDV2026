<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HR System - Import Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <h1 class="text-3xl font-bold text-gray-800">Hệ thống nạp liệu Cán bộ</h1>

        <div class="bg-white p-6 rounded-xl shadow border-l-4 border-green-600">
            <h2 class="text-lg font-bold mb-4">1. Nạp từ file Excel (.xlsx)</h2>
            <input type="file" id="excelFile" class="block w-full text-sm text-gray-500 mb-4">
            <button onclick="importExcel()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold">NẠP HÀNG LOẠT TỪ FILE</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow overflow-x-auto">
            <h2 class="text-lg font-bold mb-4">Danh sách hiện tại</h2>
            <table class="w-full text-left text-sm" id="staffTable">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3">Họ và tên</th>
                        <th class="p-3">Số CCCD</th>
                        <th class="p-3">Chức danh</th>
                    </tr>
                </thead>
                <tbody id="staffBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');

        // Hàm xử lý file Excel
        function importExcel() {
            const file = document.getElementById('excelFile').files[0];
            if (!file) return alert("Vui lòng chọn file!");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(sheet);

                // Map dữ liệu từ Excel vào các trường của DB
                const mappedData = jsonData.map(row => ({
                    full_name: row['Họ và tên'],
                    so_cccd: row['Số CCCD'],
                    chuc_danh: row['Chức danh công việc']
                }));

                const { error } = await supabase.from('staff_list').insert(mappedData);
                if(error) alert("Lỗi: " + error.message);
                else { alert("Nạp thành công " + mappedData.length + " bản ghi!"); loadData(); }
            };
            reader.readAsArrayBuffer(file);
        }

        async function loadData() {
            const { data } = await supabase.from('staff_list').select('full_name, so_cccd, chuc_danh');
            document.getElementById('staffBody').innerHTML = data.map(s => `
                <tr class="border-b">
                    <td class="p-3">${s.full_name || ''}</td>
                    <td class="p-3">${s.so_cccd || ''}</td>
                    <td class="p-3">${s.chuc_danh || ''}</td>
                </tr>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
