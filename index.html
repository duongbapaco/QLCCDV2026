<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Leave Manager Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Đăng ký nghỉ phép</h2>
    <div class="form-group">
        <label>Họ và tên:</label>
        <input type="text" id="userName" placeholder="Nhập tên của bạn">
    </div>
    <div class="form-group">
        <label>Từ ngày:</label>
        <input type="date" id="startDate">
    </div>
    <div class="form-group">
        <label>Đến ngày:</label>
        <input type="date" id="endDate">
    </div>
    <div class="form-group">
        <label>Lý do:</label>
        <select id="reason">
            <option value="Nghỉ phép năm">Nghỉ phép năm</option>
            <option value="Nghỉ ốm">Nghỉ ốm</option>
            <option value="Việc riêng">Việc riêng</option>
        </select>
    </div>
    <button onclick="handleSubmit()">Gửi đơn</button>

    <script>
        // Khởi tạo Supabase
        const supabase = supabase.createClient(
            'https://qztflyvraluxtpzbmtgp.supabase.co', 
            'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B'
        );

        // Logic tính ngày làm việc
        function calculateWorkingDays(start, end) {
            let count = 0;
            let curDate = new Date(start);
            const endDate = new Date(end);
            while (curDate <= endDate) {
                let day = curDate.getDay();
                if (day !== 0 && day !== 6) count++;
                curDate.setDate(curDate.getDate() + 1);
            }
            return count;
        }

        // Hàm xử lý gửi dữ liệu
        async function handleSubmit() {
            const userName = document.getElementById('userName').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const reason = document.getElementById('reason').value;

            if (!userName || !startDate || !endDate) {
                alert("Vui lòng điền đầy đủ thông tin!");
                return;
            }

            const totalDays = calculateWorkingDays(startDate, endDate);

            const { data, error } = await supabase
                .from('leave_requests')
                .insert([
                    { user_name: userName, start_date: startDate, end_date: endDate, total_days: totalDays, reason: reason, status: 'pending' }
                ]);

            if (error) {
                alert("Lỗi: " + error.message);
            } else {
                alert("Đã gửi đơn thành công! Tổng số ngày: " + totalDays);
            }
        }
    </script>
</body>
</html>
