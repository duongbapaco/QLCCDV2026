<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Nhân Sự & Nghỉ Phép</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #f1f5f9; }
        .table-zebra tbody tr:nth-child(even) { background-color: #f8fafc; }
        .table-hover tbody tr:hover { background-color: #e2e8f0; transition: 0.2s; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #cbd5e1; padding: 12px; text-align: left; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto space-y-8">
        <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm border">
            <h1 class="font-bold text-xl text-slate-800">HỆ THỐNG QUẢN LÝ NGHỈ PHÉP 2026</h1>
            <div id="connStatus" class="px-3 py-1 rounded-full bg-red-100 text-red-600 text-xs font-bold">KẾT NỐI ONLINE</div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border">
            <h2 class="font-bold text-slate-800 mb-4">📋 Bước 1: Danh sách nhân sự</h2>
            <div id="pasteArea" contenteditable="true" class="w-full p-6 border-2 border-dashed border-slate-300 rounded-lg text-center text-slate-400 mb-4">Dán dữ liệu Excel (Ctrl+V) tại đây</div>
            <div class="overflow-x-auto"><table class="table-zebra table-hover text-sm" id="staffTable"><thead class="bg-slate-100 font-bold uppercase text-xs" id="staffHead"></thead><tbody id="staffBody"></tbody></table></div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border">
            <h2 class="font-bold text-slate-800 mb-6">📝 Bước 2: Form Đăng Ký</h2>
            <div class="grid grid-cols-5 gap-4 mb-4">
                <div><label class="block text-xs font-bold">CÁN BỘ</label><select id="staffSelect" class="w-full p-2 border rounded text-sm"></select></div>
                <div><label class="block text-xs font-bold">TỪ NGÀY</label><input type="date" id="d1" onchange="calculateDays()" class="w-full p-2 border rounded text-sm"></div>
                <div><label class="block text-xs font-bold">ĐẾN NGÀY</label><input type="date" id="d2" onchange="calculateDays()" class="w-full p-2 border rounded text-sm"></div>
                <div><label class="block text-xs font-bold">SỐ NGÀY</label><input type="text" id="total" disabled class="w-full p-2 border rounded bg-yellow-50 text-sm"></div>
                <div><label class="block text-xs font-bold">SĐT</label><input type="text" id="phone" class="w-full p-2 border rounded text-sm"></div>
            </div>
            <button onclick="submitData()" class="bg-blue-900 text-white px-6 py-2 rounded text-sm font-bold">🚀 Gửi Đơn & Lưu Cloud</button>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border">
            <div class="flex justify-between mb-4"><h2 class="font-bold">🔵 Bước 3: Thống Kê & Báo Cáo</h2>
                <div class="flex gap-2"><button onclick="exportToExcel()" class="bg-green-700 text-white px-4 py-1 rounded text-xs">XUẤT EXCEL</button><button onclick="exportToPDF()" class="bg-red-700 text-white px-4 py-1 rounded text-xs">XUẤT PDF</button></div>
            </div>
            <table class="table-zebra" id="reportTable"><thead><tr><th>Họ và Tên</th><th>Quỹ Phép</th><th>Đã Nghỉ</th><th>Tiến Độ</th></tr></thead><tbody id="reportBody"></tbody></table>
        </div>
    </div>

    <script>
        // Khởi tạo Supabase
        window.supabaseInstance = supabase.createClient('https://qztflyvraluxtpzbmtgp.supabase.co', 'sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B');

        document.addEventListener('DOMContentLoaded', () => {
            // Kiểm tra kết nối
            window.supabaseInstance.from('lich_nghi').select('id', {limit:1}).then(({error}) => {
                const ind = document.getElementById('connStatus');
                if(!error) { ind.innerText = "ĐÃ KẾT NỐI ONLINE"; ind.className = "px-3 py-1 rounded-full bg-green-100 text-green-700 text-xs font-bold"; }
            });
        });

        // Xử lý dữ liệu
        document.getElementById('pasteArea').addEventListener('paste', (e) => {
            const data = e.clipboardData.getData('text/html') || e.clipboardData.getData('text/plain');
            const div = document.createElement('div'); div.innerHTML = data;
            const rows = Array.from((div.querySelector('table') || div).querySelectorAll('tr'));
            const head = document.getElementById('staffHead'); const body = document.getElementById('staffBody');
            const select = document.getElementById('staffSelect');
            rows.forEach((row, i) => {
                const cells = Array.from(row.querySelectorAll('td, th'));
                if (cells.length < 2) return;
                const tr = document.createElement('tr');
                cells.forEach(c => tr.innerHTML += `<td>${c.innerText}</td>`);
                if (i === 0) head.appendChild(tr); else { body.appendChild(tr); select.innerHTML += `<option>${cells[1].innerText}</option>`; }
            });
            document.getElementById('pasteArea').style.display = 'none';
        });

        function calculateDays() {
            const d1 = new Date(document.getElementById('d1').value);
            const d2 = new Date(document.getElementById('d2').value);
            if(d2 >= d1) document.getElementById('total').value = ((d2 - d1) / 86400000 + 1) + " ngày";
        }

        async function submitData() {
            const { error } = await window.supabaseInstance.from('lich_nghi').insert([{ ho_ten: document.getElementById('staffSelect').value }]);
            if(!error) alert("Dữ liệu đã được lưu lên Cloud!");
        }

        function exportToExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('reportTable')), "BaoCao.xlsx"); }
        function exportToPDF() {
            const el = document.createElement('div'); el.innerHTML = `<div style="font-family:'Times New Roman'; padding:40px;"><h2>BÁO CÁO NGHỈ PHÉP</h2>${document.getElementById('reportTable').outerHTML}</div>`;
            html2pdf().from(el).save('BaoCao.pdf');
        }
    </script>
</body>
</html>
