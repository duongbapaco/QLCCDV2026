<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dán Danh sách Nhân sự</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-xl mx-auto space-y-4">
        <h2 class="font-bold text-gray-700">1. Dán danh sách tên (mỗi tên 1 dòng)</h2>
        <textarea id="nameList" rows="5" class="w-full p-3 border rounded shadow-sm" placeholder="Ví dụ:&#10;Nguyễn Văn A&#10;Trần Thị B..."></textarea>
        
        <button onclick="generateTable()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">HIỂN THỊ DANH SÁCH</button>

        <div class="bg-white rounded-lg shadow mt-6">
            <table class="w-full text-left">
                <thead class="bg-gray-100">
                    <tr><th class="p-3">Họ và tên</th><th class="p-3">Chức vụ</th></tr>
                </thead>
                <tbody id="resultBody" class="divide-y"></tbody>
            </table>
        </div>
    </div>

    <script>
        function generateTable() {
            const rawText = document.getElementById('nameList').value;
            // Tách theo dòng, bỏ dòng trống
            const names = rawText.split('\n').filter(n => n.trim() !== "");
            
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = names.map(name => `
                <tr>
                    <td class="p-3 font-medium">${name.trim()}</td>
                    <td class="p-3">
                        <select class="p-1 border rounded text-sm w-32 bg-gray-50">
                            <option>Nhân viên</option>
                            <option>Tổ trưởng</option>
                            <option>Lãnh đạo</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
