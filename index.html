<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Leave Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl">Leave Manager</h1>
            <button class="md:hidden">Menu</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-lg shadow text-center">
                <p class="text-xs text-gray-500 uppercase">Phép năm</p>
                <p class="text-2xl font-bold">12</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow text-center">
                <p class="text-xs text-gray-500 uppercase">Đã dùng</p>
                <p class="text-2xl font-bold text-orange-500">2</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow text-center col-span-2 md:col-span-1">
                <p class="text-xs text-gray-500 uppercase">Còn lại</p>
                <p class="text-2xl font-bold text-blue-600">10</p>
            </div>
        </div>

        <section class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-lg font-bold mb-4">Đăng ký nghỉ phép</h2>
            <form id="leaveForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Họ và tên</label>
                    <input type="text" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium">Từ ngày</label>
                        <input type="date" class="w-full p-3 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Đến ngày</label>
                        <input type="date" class="w-full p-3 border rounded-lg">
                    </div>
                </div>
                <button type="button" class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold text-lg active:scale-95 transition">
                    GỬI ĐƠN XIN NGHỈ
                </button>
            </form>
        </section>
    </main>

    <script>
        // Các logic tính toán (tự động loại trừ T7, CN)
        // ... (Giữ nguyên logic của bạn đã có)
    </script>
</body>
</html>
