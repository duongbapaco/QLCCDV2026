<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HR Dashboard - Clean View</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <div id="pasteArea" contenteditable="true" 
             class="w-full p-4 border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 text-center cursor-pointer hover:border-blue-500 transition outline-none text-slate-500">
             Click vào đây và nhấn Ctrl + V để dán toàn bộ dữ liệu Excel
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left border-collapse" id="resultTable">
                <thead class="bg-slate-100 text-slate-700 uppercase text-xs tracking-wider" id="tableHead"></thead>
                <tbody id="resultBody" class="divide-y divide-slate-200"></tbody>
            </table>
        </div>
    </div>

    <script>
        const pasteArea = document.getElementById('pasteArea');
        const tableHead = document.getElementById('tableHead');
        const resultBody = document.getElementById('resultBody');

        pasteArea.addEventListener('paste', (e) => {
            e.preventDefault();
            const clipboardData = e.clipboardData.getData('text/html') || e.clipboardData.getData('text/plain');
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = clipboardData;
            
            const table = tempDiv.querySelector('table') || tempDiv;
            const rows = Array.from(table.querySelectorAll('tr'));
            
            tableHead.innerHTML = '';
            resultBody.innerHTML = '';

            rows.forEach((row, index) => {
                const cells = Array.from(row.querySelectorAll('td, th'));
                if (cells.length === 0) return;

                if (index === 0) {
                    // Header: hiển thị tiêu đề rõ ràng
                    const tr = document.createElement('tr');
                    cells.forEach(cell => {
                        tr.innerHTML += `<th class="p-4 border-b">${cell.innerText}</th>`;
                    });
                    tableHead.appendChild(tr);
                } else {
                    // Body: dữ liệu phẳng, hiển thị trực quan
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition";
                    cells.forEach(cell => {
                        tr.innerHTML += `<td class="p-4 border-b text-slate-700">${cell.innerText}</td>`;
                    });
                    resultBody.appendChild(tr);
                }
            });
            pasteArea.style.display = 'none'; // Ẩn vùng dán sau khi có dữ liệu
        });
    </script>
</body>
</html>
