<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HR Fast Processor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white p-6 rounded-xl shadow mb-4">
            <input type="file" id="upload" class="mb-2">
            <button onclick="processData()" class="bg-red-600 text-white px-6 py-2 rounded font-bold">XỬ LÝ DỮ LIỆU (NHANH)</button>
        </div>
        <div class="bg-white p-6 rounded-xl shadow h-[500px] overflow-auto">
            <table class="w-full text-xs text-left" id="dataTable">
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function processData() {
            const file = document.getElementById('upload').files[0];
            if (!file) return alert("Chọn file đi bạn!");

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                // Lấy sheet đầu tiên dưới dạng mảng thuần (header: 1)
                // Cách này bỏ qua mọi rắc rối về tiêu đề cột
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                
                const tbody = document.getElementById('tableBody');
                // Slice(1) bỏ dòng tiêu đề, render trực tiếp
                // Chỉ lấy 500 dòng đầu để tránh treo trình duyệt
                tbody.innerHTML = rows.slice(1, 501).map(row => `
                    <tr class="border-b hover:bg-gray-100">
                        <td class="p-2">${row[0] || ''}</td>
                        <td class="p-2 font-bold">${row[1] || ''}</td>
                        <td class="p-2">${row[4] || ''}</td>
                        <td class="p-2">${row[13] || ''}</td>
                    </tr>
                `).join('');
                
                alert("Đã bung " + Math.min(rows.length, 501) + " dòng!");
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
